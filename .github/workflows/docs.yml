# Builds the documentation site (MkDocs Material guides + Doxygen C++ API
# reference) and deploys it to GitHub Pages on every push to main.
#
# On pull requests the site is built but NOT deployed, so a broken docs build is
# caught before merge. Part of the docs-site epic (#1); scaffolded in #2.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'include/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'Doxyfile'
      - 'requirements-docs.txt'
      - 'scripts/fetch-doxygen-awesome.sh'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'include/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'Doxyfile'
      - 'requirements-docs.txt'
      - 'scripts/fetch-doxygen-awesome.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege by default; the deploy job needs Pages + OIDC to publish.
permissions:
  contents: read

# Concurrency is scoped by event so PR validation never queues behind a
# production deploy: each pull request gets its own lane (a newer push cancels the
# older, still-running build), while pushes to main and manual dispatches share a
# single "production" lane that is never cancelled midway through publishing.
concurrency:
  group: docs-${{ github.event_name == 'pull_request' && github.head_ref || 'production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs dependencies
        run: pip install -r requirements-docs.txt

      # Doxygen for the API reference; the Cairo/imaging system libs for the
      # Material social-cards plugin (og:image generation).
      - name: Install Doxygen + Cairo imaging libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            doxygen \
            libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Fetch doxygen-awesome-css
        run: bash scripts/fetch-doxygen-awesome.sh

      # Doxygen must run first: it writes docs/api/, which MkDocs then copies
      # into site/api/ as static files (keeping the two surfaces cleanly linked).
      - name: Build C++ API reference (Doxygen)
        run: doxygen

      - name: Build site (MkDocs)
        # --strict fails the build on broken internal links / bad nav refs, so
        # docs breakage is caught on PRs before merge (getting-started.md's links
        # were normalized for the site in #5).
        run: mkdocs build --strict

      # Publish only from main. Gating on the ref (not just "not a PR") also
      # stops a workflow_dispatch run started from a non-main branch from
      # uploading that branch's site to production Pages.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    # Build validates every PR; publish only from main. The ref check also blocks
    # a workflow_dispatch run selected from a non-main branch from deploying.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
